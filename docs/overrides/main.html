{% extends "base.html" %}

{% block extrahead %}
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  {% if page and page.file and page.file.src_path.endswith('.fa.md') %}
  <!-- Vazirmatn for Farsi -->
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .md-content { direction: rtl; text-align: right; }
    .md-content table { direction: rtl; }
    .md-typeset h1, .md-typeset h2, .md-typeset h3 { text-align: right; }
  </style>
  {% endif %}

  <!-- Pagefind search -->
  <link href="/pagefind/pagefind-ui.css" rel="stylesheet">
  <script src="/pagefind/pagefind-ui.js"></script>
{% endblock %}

{% block content %}
  {{ super() }}
{% endblock %}
