site_name: 'سامانه دانش توسعه ایران'
site_description: 'ویکی پژوهشی خودمختار برای ترسیم مسیرهای توسعه'
site_url: 'https://itks-research.github.io/itks-wiki/'

theme:
  name: material
  palette:
    - scheme: default
  font: false
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.tooltips
  custom_dir: docs/overrides

extra_css:
  - assets/css/custom.css

plugins:
  - search:
      lang:
        - en
        - fa
      separator: '[\s\-\.]+'
  - tags:
      tags_file: synthesis/index.md
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: fa
          default: true
          name: فارسی
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
