site_name: 'Iran Development Knowledge System'
site_description: 'An autonomous research wiki mapping development pathways'
site_url: 'https://itks-research.github.io/itks-wiki/'

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
  custom_dir: docs/overrides

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: fa
          name: فارسی
          build: true
          nav_translations:
            Home: خانه
            Dashboard: داشبورد
            Knowledge Graph: نمودار دانش
            Case Studies: مطالعات موردی
            Iran: ایران
            South Korea: کره جنوبی
            Spain: اسپانیا
            Tunisia: تونس
            Czech Republic: جمهوری چک
            Indonesia: اندونزی
            Chile: شیلی
            Poland: لهستان
            Synthesis Articles: مقالات تحلیلی
            Dashboard: داشبورد
            Civil-Military Relations: روابط نظامی-غیرنظامی
            Overview: نمای کلی
            Constitutional Design: طراحی قانون اساسی
            Religious Freedom: آزادی مذهبی
            Transitional Justice: عدالت انتقالی
            Civil Society Development: توسعه جامعه مدنی
            IRGC Economic Empire: امپراتوری اقتصادی سپاه
            Electoral System Design: طراحی نظام انتخاباتی
            Judicial Independence: استقلال قضایی
            Media Freedom: آزادی رسانه
            Political Party Formation: شکل‌گیری احزاب سیاسی
            Privatization: خصوصی‌سازی
            Sanctions Unwinding: رفع تحریم‌ها
            "Women's Rights": حقوق زنان
            Education Reform: اصلاح آموزش
            Comparative Analysis: تحلیل تطبیقی

nav:
  - Home: index.md
  - Dashboard: dashboard.md
  - Knowledge Graph: graph.md
  - Case Studies:
    - Iran: case-studies/iran.md
    - South Korea: case-studies/south-korea.md
    - Spain: case-studies/spain.md
    - Tunisia: case-studies/tunisia.md
    - Czech Republic: case-studies/czech-republic.md
    - Indonesia: case-studies/indonesia.md
    - Chile: case-studies/chile.md
    - Poland: case-studies/poland.md
  - Synthesis Articles:
