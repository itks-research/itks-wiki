site_name: 'Iran Development Knowledge System'
site_description: 'An autonomous research wiki mapping development pathways'
site_url: 'https://itks-research.github.io/itks-wiki/'

theme:
  name: material
  palette:
    - scheme: default
  font: false
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.tooltips
  custom_dir: docs/overrides

extra_css:
  - assets/css/custom.css

plugins:
  - search:
      lang:
        - en
        - fa
      separator: '[\s\-\.]+'
  - tags:
      tags_file: synthesis/index.md
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: fa
          name: فارسی
          build: true
          nav_translations:
            About: درباره
            Banking and financial system reform: اصلاح نظام بانکی و مالی
            Bonyad system reform: اصلاح نظام بنیادها
            Brain-drain reversal: بازگشت نخبگان
            Case Studies: مطالعات موردی
            Chile: شیلی
            Civil society development: توسعه جامعه مدنی
            Civil-military relations: روابط نظامی-غیرنظامی
            Comparative Analysis: تحلیل تطبیقی
            Constitutional design: طراحی
            Cultural heritage preservation during institutional change: حفظ میراث فرهنگی در دوره تحولات نهادی
            Czech Republic: جمهوری چک
            Diaspora repatriation and reintegration: بازگشت و ادغام دیاسپورا
            Economic Reform: اصلاحات اقتصادی
            Education system reform: اصلاح نظام آموزشی
            Electoral system design and implementation: طراحی و اجرای نظام انتخاباتی
            Ethnic federalism in Iran: فدرالیسم قومی در ایران
            Federalism, unitarism, and autonomy models: فدرالیسم، تمرکزگرایی و مدل‌های خودمختاری
            Home: خانه
            How to Use This Site: راهنمای استفاده از سایت
            IRGC economic empire: امپراتوری اقتصادی سپاه
            Indonesia: اندونزی
            Internet and digital infrastructure as civic space: اینترنت و زیرساخت دیجیتال به‌عنوان فضای مدنی
            Iran: ایران
            Iran-Specific: ویژه ایران
            Judicial independence and rule of law: استقلال قضایی و حاکمیت قانون
            Knowledge Graph: نمودار دانش
            Labor market reform: اصلاح بازار کار
            Media freedom: آزادی رسانه
            Methodology: روش‌شناسی
            Minority rights: حقوق اقلیت‌ها
            Nuclear program civilian transition: انتقال غیرنظامی برنامه هسته‌ای
            Overview: نمای کلی
            Poland: لهستان
            Political Institutions: نهادهای سیاسی
            Political party formation and pluralism: شکل‌گیری احزاب سیاسی و تکثرگرایی
            Power-sharing mechanisms during transition periods: سازوکارهای تقسیم قدرت در دوره گذار
            Privatization: خصوصی‌سازی
            Regional foreign policy reorientation: بازتعریف سیاست خارجی منطقه‌ای
            Religious freedom: آزادی مذهبی
            Research Findings: یافته‌های پژوهشی
            Resource curse management: مدیریت نفرین منابع طبیعی
            Sanctions unwinding: رفع تحریم‌ها
            Seminary role in post-theocratic society: نقش حوزه علمیه در جامعه پساتئوکراتیک
            Society & Culture: جامعه و فرهنگ
            Source Explorer: کاوشگر منابع
            South Korea: کره جنوبی
            Spain: اسپانیا
