site_name: 'Iran Transition Knowledge System'
site_description: 'An autonomous research wiki mapping democratic transition pathways'
site_url: 'https://itks-research.github.io/itks-wiki/'

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
  custom_dir: docs/overrides

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: fa
          name: فارسی
          build: true
          nav_translations:
            Home: خانه
            Dashboard: داشبورد
            Knowledge Graph: نمودار دانش

nav:
  - Home: index.md
  - Dashboard: dashboard.md
  - Knowledge Graph: graph.md

markdown_extensions:
  - tables
  - attr_list
  - md_in_html
